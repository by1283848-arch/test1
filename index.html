<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프리미엄 로또 생성기</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="header">
    <button id="theme-toggle">다크 모드</button>
  </div>
  
  <div class="container">
    <section class="glass-card lotto-section">
      <h1>Premium Lotto</h1>
      <div id="lotto-container">
        <!-- 로또 번호 세트가 여기에 생성됩니다 -->
      </div>
      <button id="generate-lotto" class="main-button">행운의 번호 생성하기</button>
    </section>

    <section class="glass-card contact-section">
      <h2>비즈니스 제휴 문의</h2>
      <form action="https://formspree.io/f/maqlzlbq" method="POST" class="contact-form">
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" name="email" id="email" required placeholder="example@email.com">
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea name="message" id="message" required placeholder="제안 내용을 상세히 입력해 주세요..."></textarea>
        </div>
        <button type="submit" class="submit-button">제휴 제안 제출하기</button>
      </form>
    </section>

    <section class="glass-card comment-section">
      <h2>댓글</h2>
      <div id="disqus_thread"></div>
      <script>
          (function() { // DON'T EDIT BELOW THIS LINE
          var d = document, s = d.createElement('script');
          s.src = 'https://test1-nonjr1gdxg.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
          })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>
  </div>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
