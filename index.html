<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucky Roulette Dashboard</title>
  <meta name="description" content="현대적인 대시보드 스타일의 랜덤 숫자 룰렛">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8027110651673312"
     crossorigin="anonymous"></script>
  <link href='/style.css' rel='stylesheet'>
  <!-- Lucide Icons for modern icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="bento-container">
    <!-- Header Card -->
    <header class="card bento-header">
      <div class="logo">Lucky Roulette</div>
      <button id="theme-toggle" class="icon-btn"><i data-lucide="sun"></i></button>
    </header>

    <!-- Main Roulette Card -->
    <main class="card bento-main">
      <div class="card-content">
        <i data-lucide="refresh-cw" class="accent-icon"></i>
        <h1>오늘의 숫자</h1>
        <div class="roulette-display">
          <span id="result-number">?</span>
        </div>
        <button id="spin-btn" class="primary-btn">추첨하기</button>
      </div>
    </main>

    <!-- Range Setting Card -->
    <section class="card bento-range">
      <div class="card-label"><i data-lucide="settings-2"></i> 범위 설정</div>
      <div class="range-input-wrapper">
        <span class="range-hint">1 ~</span>
        <input type="number" id="max-number" min="1" max="100" value="100">
      </div>
    </section>

    <!-- Feature 1: Fairness -->
    <section class="card bento-feature-1">
      <i data-lucide="shield-check" class="feature-icon"></i>
      <h3>공정한 추출</h3>
      <p>난수 알고리즘 적용</p>
    </section>

    <!-- Feature 2: Speed -->
    <section class="card bento-feature-2">
      <i data-lucide="zap" class="feature-icon"></i>
      <h3>빠른 결과</h3>
      <p>즉시 확인 가능</p>
    </section>

    <!-- FAQ/Guide Card -->
    <section class="card bento-guide">
      <div class="card-label"><i data-lucide="help-circle"></i> 가이드</div>
      <div class="faq-mini">
        <details>
          <summary>최대 범위는?</summary>
          <p>현재 100까지 지원합니다.</p>
        </details>
        <details>
          <summary>조작이 없나요?</summary>
          <p>공개된 알고리즘을 사용합니다.</p>
        </details>
      </div>
    </section>

    <!-- Partnership Card -->
    <section class="card bento-contact">
      <div class="card-label"><i data-lucide="mail"></i> 제휴 문의</div>
      <form action="https://formspree.io/f/maqlzlbq" method="POST" class="mini-form">
        <input type="email" name="email" required placeholder="이메일">
        <button type="submit">제출</button>
      </form>
    </section>

    <!-- Disqus Card (Wide) -->
    <section class="card bento-comments">
      <div class="card-label"><i data-lucide="message-square"></i> 소통 공간</div>
      <div id="disqus_thread"></div>
    </section>
  </div>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();
  </script>
  <script defer type="text/javascript" src="/main.js"></script>
  <!-- Disqus Script -->
  <script>
    (function() {
    var d = document, s = d.createElement('script');
    s.src = 'https://test1-nonjr1gdxg.disqus.com/embed.js';
    s.setAttribute('data-timestamp', +new Date());
    (d.head || d.body).appendChild(s);
    })();
  </script>
</body>
</html>
